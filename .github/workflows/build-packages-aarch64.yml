name: Build changed packages (aarch64)

on:
  push:
    paths:
      - 'packages/**'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package name to build (leave blank to detect from last commit)'
        required: false
        default: ''

jobs:
  # ── Job 1: detect which packages changed ─────────────────────────────────
  detect:
    name: Detect changed packages
    runs-on: [self-hosted, self-hosted-aarch64]
    container:
      image: ghcr.io/devducks/archlinuxarm:latest
    outputs:
      pkgs_no_dep:          ${{ steps.classify.outputs.pkgs_no_dep }}
      has_cmake_dep:        ${{ steps.classify.outputs.has_cmake_dep }}
      has_needs_cmake:      ${{ steps.classify.outputs.has_needs_cmake }}
      has_libindi:          ${{ steps.classify.outputs.has_libindi }}
      has_3rdparty_libs:    ${{ steps.classify.outputs.has_3rdparty_libs }}
      has_3rdparty_drivers: ${{ steps.classify.outputs.has_3rdparty_drivers }}
      has_libindi_git:          ${{ steps.classify.outputs.has_libindi_git }}
      has_3rdparty_libs_git:    ${{ steps.classify.outputs.has_3rdparty_libs_git }}
      has_3rdparty_drivers_git: ${{ steps.classify.outputs.has_3rdparty_drivers_git }}
      has_stellarsolver:    ${{ steps.classify.outputs.has_stellarsolver }}
      has_kstars:           ${{ steps.classify.outputs.has_kstars }}
      has_kstars_git:       ${{ steps.classify.outputs.has_kstars_git }}
    steps:
      - name: bootstrap
        run: pacman-key --init && pacman-key --populate archlinuxarm && pacman -Syu --noconfirm
      - name: Install git
        run: pacman -Sy --noconfirm --noprogressbar git

      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect and classify changed packages
        id: classify
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: bash ci/detect-changes-aarch64.sh "${{ inputs.package }}"

  # ── Job 2: build cmake-python-distributions first (if changed) ───────────
  build-cmake-python-distributions:
    name: Build cmake-python-distributions
    needs: detect
    if: needs.detect.outputs.has_cmake_dep == 'true'
    runs-on: [self-hosted, self-hosted-aarch64]
    container:
      image: ghcr.io/devducks/archlinuxarm:latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build cmake-python-distributions
        run: bash ci/build-package.sh cmake-python-distributions

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-cmake-python-distributions
          path: packages/cmake-python-distributions/*.pkg.tar.xz
          retention-days: 14

  # ── Job 3: build simplejpeg after cmake-python-distributions ─────────────
  # "skipped" upstream jobs are treated as success, so this job still runs
  # when only simplejpeg changed (job 2 was skipped).
  build-simplejpeg:
    name: Build simplejpeg
    needs:
      - detect
      - build-cmake-python-distributions
    if: needs.detect.outputs.has_needs_cmake == 'true'
    runs-on: [self-hosted, self-hosted-aarch64]
    container:
      image: ghcr.io/devducks/archlinuxarm:latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Present only when cmake-python-distributions was rebuilt in this run.
      # continue-on-error so the step is silently skipped when absent.
      - name: Download cmake-python-distributions artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pkg-cmake-python-distributions
          path: /tmp/local-pkgs/

      - name: Build simplejpeg
        env:
          LOCAL_PKG_DIR: /tmp/local-pkgs
        run: bash ci/build-package.sh simplejpeg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-simplejpeg
          path: packages/simplejpeg/*.pkg.tar.xz
          retention-days: 14

  # ── Job 4: matrix build for all other packages ───────────────────────────
  build-package:
    name: "Build ${{ matrix.package }}"
    needs: detect
    if: needs.detect.outputs.pkgs_no_dep != '[]'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect.outputs.pkgs_no_dep) }}
    runs-on: [self-hosted, self-hosted-aarch64]
    container:
      image: ghcr.io/devducks/archlinuxarm:latest
    # 90 is a safe ceiling for long builds
    timeout-minutes: 90
    steps:
      - name: bootstrap
        run: pacman-key --init && pacman-key --populate archlinuxarm && pacman -Syu --noconfirm
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.package }}
        run: bash ci/build-package.sh "${{ matrix.package }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: "pkg-${{ matrix.package }}"
          path: "packages/${{ matrix.package }}/*.pkg.tar.xz"
          if-no-files-found: error
          retention-days: 14

  # ── INDI stable chain ─────────────────────────────────────────────────────
  build-libindi:
    name: Build libindi
    needs: detect
    if: needs.detect.outputs.has_libindi == 'true'
    runs-on: [self-hosted, self-hosted-aarch64]
    container:
      image: ghcr.io/devducks/archlinuxarm:latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Build libindi
        run: bash ci/build-package.sh libindi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-libindi
          path: packages/libindi/*.pkg.tar.xz
          if-no-files-found: error
          retention-days: 14

  build-indi-3rdparty-libs:
    name: Build indi-3rdparty-libs
    needs: [detect, build-libindi]
    if: |
      always() &&
      (needs.detect.outputs.has_libindi == 'true' || needs.detect.outputs.has_3rdparty_libs == 'true') &&
      (needs.build-libindi.result == 'success' || needs.build-libindi.result == 'skipped')
    runs-on: [self-hosted, self-hosted-aarch64]
    container:
      image: ghcr.io/devducks/archlinuxarm:latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Download libindi artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pkg-libindi
          path: /tmp/local-pkgs/
      - name: Build indi-3rdparty-libs
        env:
          LOCAL_PKG_DIR: /tmp/local-pkgs
        run: bash ci/build-package.sh indi-3rdparty-libs
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-indi-3rdparty-libs
          path: packages/indi-3rdparty-libs/*.pkg.tar.xz
          if-no-files-found: error
          retention-days: 14

  build-indi-3rdparty-drivers:
    name: Build indi-3rdparty-drivers
    needs: [detect, build-libindi, build-indi-3rdparty-libs]
    if: |
      always() &&
      (needs.detect.outputs.has_libindi == 'true' || needs.detect.outputs.has_3rdparty_libs == 'true' || needs.detect.outputs.has_3rdparty_drivers == 'true') &&
      (needs.build-libindi.result == 'success' || needs.build-libindi.result == 'skipped') &&
      (needs.build-indi-3rdparty-libs.result == 'success' || needs.build-indi-3rdparty-libs.result == 'skipped')
    runs-on: [self-hosted, self-hosted-aarch64]
    container:
      image: ghcr.io/devducks/archlinuxarm:latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Download libindi artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pkg-libindi
          path: /tmp/local-pkgs/
      - name: Download indi-3rdparty-libs artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pkg-indi-3rdparty-libs
          path: /tmp/local-pkgs/
      - name: Build indi-3rdparty-drivers
        env:
          LOCAL_PKG_DIR: /tmp/local-pkgs
        run: bash ci/build-package.sh indi-3rdparty-drivers
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-indi-3rdparty-drivers
          path: packages/indi-3rdparty-drivers/*.pkg.tar.xz
          if-no-files-found: error
          retention-days: 14

  # ── INDI git chain ────────────────────────────────────────────────────────
  build-libindi-git:
    name: Build libindi-git
    needs: detect
    if: needs.detect.outputs.has_libindi_git == 'true'
    runs-on: [self-hosted, self-hosted-aarch64]
    container:
      image: ghcr.io/devducks/archlinuxarm:latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Build libindi-git
        run: bash ci/build-package.sh libindi-git
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-libindi-git
          path: packages/libindi-git/*.pkg.tar.xz
          if-no-files-found: error
          retention-days: 14

  build-indi-3rdparty-libs-git:
    name: Build indi-3rdparty-libs-git
    needs: [detect, build-libindi-git]
    if: |
      always() &&
      (needs.detect.outputs.has_libindi_git == 'true' || needs.detect.outputs.has_3rdparty_libs_git == 'true') &&
      (needs.build-libindi-git.result == 'success' || needs.build-libindi-git.result == 'skipped')
    runs-on: [self-hosted, self-hosted-aarch64]
    container:
      image: ghcr.io/devducks/archlinuxarm:latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Download libindi-git artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pkg-libindi-git
          path: /tmp/local-pkgs/
      - name: Build indi-3rdparty-libs-git
        env:
          LOCAL_PKG_DIR: /tmp/local-pkgs
        run: bash ci/build-package.sh indi-3rdparty-libs-git
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-indi-3rdparty-libs-git
          path: packages/indi-3rdparty-libs-git/*.pkg.tar.xz
          if-no-files-found: error
          retention-days: 14

  build-indi-3rdparty-drivers-git:
    name: Build indi-3rdparty-drivers-git
    needs: [detect, build-libindi-git, build-indi-3rdparty-libs-git]
    if: |
      always() &&
      (needs.detect.outputs.has_libindi_git == 'true' || needs.detect.outputs.has_3rdparty_libs_git == 'true' || needs.detect.outputs.has_3rdparty_drivers_git == 'true') &&
      (needs.build-libindi-git.result == 'success' || needs.build-libindi-git.result == 'skipped') &&
      (needs.build-indi-3rdparty-libs-git.result == 'success' || needs.build-indi-3rdparty-libs-git.result == 'skipped')
    runs-on: [self-hosted, self-hosted-aarch64]
    container:
      image: ghcr.io/devducks/archlinuxarm:latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Download libindi-git artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pkg-libindi-git
          path: /tmp/local-pkgs/
      - name: Download indi-3rdparty-libs-git artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pkg-indi-3rdparty-libs-git
          path: /tmp/local-pkgs/
      - name: Build indi-3rdparty-drivers-git
        env:
          LOCAL_PKG_DIR: /tmp/local-pkgs
        run: bash ci/build-package.sh indi-3rdparty-drivers-git
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-indi-3rdparty-drivers-git
          path: packages/indi-3rdparty-drivers-git/*.pkg.tar.xz
          if-no-files-found: error
          retention-days: 14

  # ── KStars chain ──────────────────────────────────────────────────────────
  build-stellarsolver:
    name: Build stellarsolver
    needs: detect
    if: needs.detect.outputs.has_stellarsolver == 'true'
    runs-on: [self-hosted, self-hosted-aarch64]
    container:
      image: ghcr.io/devducks/archlinuxarm:latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Build stellarsolver
        run: bash ci/build-package.sh stellarsolver
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-stellarsolver
          path: packages/stellarsolver/*.pkg.tar.xz
          if-no-files-found: error
          retention-days: 14

  build-kstars:
    name: Build kstars
    needs: [detect, build-libindi, build-stellarsolver]
    if: |
      always() &&
      needs.detect.outputs.has_kstars == 'true' &&
      (needs.build-libindi.result == 'success' || needs.build-libindi.result == 'skipped') &&
      (needs.build-stellarsolver.result == 'success' || needs.build-stellarsolver.result == 'skipped')
    runs-on: [self-hosted, self-hosted-aarch64]
    container:
      image: ghcr.io/devducks/archlinuxarm:latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Download libindi artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pkg-libindi
          path: /tmp/local-pkgs/
      - name: Download stellarsolver artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pkg-stellarsolver
          path: /tmp/local-pkgs/
      - name: Build kstars
        env:
          LOCAL_PKG_DIR: /tmp/local-pkgs
        run: bash ci/build-package.sh kstars
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-kstars
          path: packages/kstars/*.pkg.tar.xz
          if-no-files-found: error
          retention-days: 14

  build-kstars-git:
    name: Build kstars-git
    needs: [detect, build-libindi-git, build-stellarsolver]
    if: |
      always() &&
      needs.detect.outputs.has_kstars_git == 'true' &&
      (needs.build-libindi-git.result == 'success' || needs.build-libindi-git.result == 'skipped') &&
      (needs.build-stellarsolver.result == 'success' || needs.build-stellarsolver.result == 'skipped')
    runs-on: [self-hosted, self-hosted-aarch64]
    container:
      image: ghcr.io/devducks/archlinuxarm:latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Download libindi-git artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pkg-libindi-git
          path: /tmp/local-pkgs/
      - name: Download stellarsolver artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pkg-stellarsolver
          path: /tmp/local-pkgs/
      - name: Build kstars-git
        env:
          LOCAL_PKG_DIR: /tmp/local-pkgs
        run: bash ci/build-package.sh kstars-git
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-kstars-git
          path: packages/kstars-git/*.pkg.tar.xz
          if-no-files-found: error
          retention-days: 14
