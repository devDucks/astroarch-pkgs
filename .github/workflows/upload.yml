name: Publish Release
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID of the build workflow to upload from'
        required: true
      arch:
        description: 'Target architecture (x86_64 or aarch64)'
        required: false
        default: 'x86_64'
      packages:
        description: 'Space-separated package names to upload (leave blank to upload all artifacts)'
        required: false
        default: ''
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pkg-*
          path: ./artifacts
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect packages to upload
        run: |
          mkdir -p ./packages
          if [ -z "${{ inputs.packages }}" ]; then
            find ./artifacts -name '*.pkg.tar.zst' -exec cp {} ./packages/ \;
          else
            for pkg in ${{ inputs.packages }}; do
              if [ -d "./artifacts/pkg-${pkg}" ]; then
                cp ./artifacts/pkg-${pkg}/*.pkg.tar.zst ./packages/
              else
                echo "WARNING: no artifact found for package '${pkg}'"
              fi
            done
          fi
          echo "Packages to upload:"
          ls ./packages/

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H $(echo "${{ secrets.HETZNER_HOST }}" | cut -d@ -f2) >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Push to Hetzner
        run: |
          rsync -avz -e "ssh -i ~/.ssh/id_deploy" \
            ./packages/ ${{ secrets.HETZNER_HOST }}:astromatto-repo/${{ inputs.arch }}
