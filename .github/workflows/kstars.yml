name: Build KStars chain

on:
  push:
    paths:
      - 'packages/kstars/**'
      - 'packages/kstars-git/**'
      - 'packages/stellarsolver/**'
      - 'packages/libindi/**'
      - 'packages/libindi-git/**'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to build (kstars, kstars-git, stellarsolver, libindi, libindi-git; leave blank to auto-detect)'
        required: false
        default: ''
      arch:
        description: 'Architecture to build'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - x86_64
          - aarch64

jobs:
  # ── Detect which packages changed + compute arch matrix ──────────────────────
  detect:
    name: Detect changed packages
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    outputs:
      has_libindi:            ${{ steps.classify.outputs.has_libindi }}
      has_libindi_git:        ${{ steps.classify.outputs.has_libindi_git }}
      has_stellarsolver:      ${{ steps.classify.outputs.has_stellarsolver }}
      has_kstars:             ${{ steps.classify.outputs.has_kstars }}
      has_kstars_git:         ${{ steps.classify.outputs.has_kstars_git }}
      has_kstars_libindi:     ${{ steps.classify.outputs.has_kstars_libindi }}
      has_kstars_git_libindi: ${{ steps.classify.outputs.has_kstars_git_libindi }}
      arch_matrix:            ${{ steps.set-matrix.outputs.arch_matrix }}
    steps:
      - name: Install git
        run: pacman -Sy --noconfirm --noprogressbar git

      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect and classify changed packages
        id: classify
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: bash ci/detect-changes.sh "${{ inputs.package }}"

      - name: Set arch matrix
        id: set-matrix
        run: |
          x86='{"arch":"x86_64","runner":"\"ubuntu-latest\"","image":"archlinux:latest","pkg_glob":"*.pkg.tar.zst"}'
          arm='{"arch":"aarch64","runner":"[\"self-hosted\",\"self-hosted-aarch64\"]","image":"ghcr.io/devducks/archlinuxarm:latest","pkg_glob":"*.pkg.tar.xz"}'
          case "${{ inputs.arch }}" in
            x86_64)  echo "arch_matrix={\"include\":[$x86]}" >> "$GITHUB_OUTPUT" ;;
            aarch64) echo "arch_matrix={\"include\":[$arm]}" >> "$GITHUB_OUTPUT" ;;
            *)       echo "arch_matrix={\"include\":[$x86,$arm]}" >> "$GITHUB_OUTPUT" ;;
          esac

  # ── libindi (stable) ─────────────────────────────────────────────────────────
  build-libindi:
    name: "Build libindi [${{ matrix.arch }}]"
    needs: detect
    if: needs.detect.outputs.has_libindi == 'true' || needs.detect.outputs.has_kstars_libindi == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.arch_matrix) }}
    runs-on: ${{ fromJson(matrix.runner) }}
    container:
      image: ${{ matrix.image }}
    timeout-minutes: 30
    steps:
      - name: Bootstrap pacman keyring
        if: matrix.arch == 'aarch64'
        run: pacman-key --init && pacman-key --populate archlinuxarm && pacman -Syu --noconfirm

      - uses: actions/checkout@v4

      - name: Build libindi
        run: bash ci/build-package.sh libindi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-libindi-${{ matrix.arch }}
          path: packages/libindi/${{ matrix.pkg_glob }}
          if-no-files-found: error
          retention-days: 14

  # ── stellarsolver ─────────────────────────────────────────────────────────────
  build-stellarsolver:
    name: "Build stellarsolver [${{ matrix.arch }}]"
    needs: detect
    if: needs.detect.outputs.has_stellarsolver == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.arch_matrix) }}
    runs-on: ${{ fromJson(matrix.runner) }}
    container:
      image: ${{ matrix.image }}
    timeout-minutes: 30
    steps:
      - name: Bootstrap pacman keyring
        if: matrix.arch == 'aarch64'
        run: pacman-key --init && pacman-key --populate archlinuxarm && pacman -Syu --noconfirm

      - uses: actions/checkout@v4

      - name: Build stellarsolver
        run: bash ci/build-package.sh stellarsolver

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-stellarsolver-${{ matrix.arch }}
          path: packages/stellarsolver/${{ matrix.pkg_glob }}
          if-no-files-found: error
          retention-days: 14

  # ── kstars (stable): libindi + stellarsolver → kstars ────────────────────────
  build-kstars:
    name: "Build kstars [${{ matrix.arch }}]"
    needs: [detect, build-libindi, build-stellarsolver]
    if: |
      always() &&
      needs.detect.outputs.has_kstars == 'true' &&
      (needs.build-libindi.result == 'success' || needs.build-libindi.result == 'skipped') &&
      (needs.build-stellarsolver.result == 'success' || needs.build-stellarsolver.result == 'skipped')
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.arch_matrix) }}
    runs-on: ${{ fromJson(matrix.runner) }}
    container:
      image: ${{ matrix.image }}
    timeout-minutes: 90
    steps:
      - name: Bootstrap pacman keyring
        if: matrix.arch == 'aarch64'
        run: pacman-key --init && pacman-key --populate archlinuxarm && pacman -Syu --noconfirm

      - uses: actions/checkout@v4

      - name: Download libindi artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pkg-libindi-${{ matrix.arch }}
          path: /tmp/local-pkgs/

      - name: Download stellarsolver artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pkg-stellarsolver-${{ matrix.arch }}
          path: /tmp/local-pkgs/

      - name: Build kstars
        env:
          LOCAL_PKG_DIR: /tmp/local-pkgs
        run: bash ci/build-package.sh kstars

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-kstars-${{ matrix.arch }}
          path: packages/kstars/${{ matrix.pkg_glob }}
          if-no-files-found: error
          retention-days: 14

  # ── libindi-git ───────────────────────────────────────────────────────────────
  build-libindi-git:
    name: "Build libindi-git [${{ matrix.arch }}]"
    needs: detect
    if: needs.detect.outputs.has_libindi_git == 'true' || needs.detect.outputs.has_kstars_git_libindi == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.arch_matrix) }}
    runs-on: ${{ fromJson(matrix.runner) }}
    container:
      image: ${{ matrix.image }}
    timeout-minutes: 30
    steps:
      - name: Bootstrap pacman keyring
        if: matrix.arch == 'aarch64'
        run: pacman-key --init && pacman-key --populate archlinuxarm && pacman -Syu --noconfirm

      - uses: actions/checkout@v4

      - name: Build libindi-git
        run: bash ci/build-package.sh libindi-git

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-libindi-git-${{ matrix.arch }}
          path: packages/libindi-git/${{ matrix.pkg_glob }}
          if-no-files-found: error
          retention-days: 14

  # ── kstars-git: libindi-git + stellarsolver → kstars-git ─────────────────────
  build-kstars-git:
    name: "Build kstars-git [${{ matrix.arch }}]"
    needs: [detect, build-libindi-git, build-stellarsolver]
    if: |
      always() &&
      needs.detect.outputs.has_kstars_git == 'true' &&
      (needs.build-libindi-git.result == 'success' || needs.build-libindi-git.result == 'skipped') &&
      (needs.build-stellarsolver.result == 'success' || needs.build-stellarsolver.result == 'skipped')
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.arch_matrix) }}
    runs-on: ${{ fromJson(matrix.runner) }}
    container:
      image: ${{ matrix.image }}
    timeout-minutes: 90
    steps:
      - name: Bootstrap pacman keyring
        if: matrix.arch == 'aarch64'
        run: pacman-key --init && pacman-key --populate archlinuxarm && pacman -Syu --noconfirm

      - uses: actions/checkout@v4

      - name: Download libindi-git artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pkg-libindi-git-${{ matrix.arch }}
          path: /tmp/local-pkgs/

      - name: Download stellarsolver artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pkg-stellarsolver-${{ matrix.arch }}
          path: /tmp/local-pkgs/

      - name: Build kstars-git
        env:
          LOCAL_PKG_DIR: /tmp/local-pkgs
        run: bash ci/build-package.sh kstars-git

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-kstars-git-${{ matrix.arch }}
          path: packages/kstars-git/${{ matrix.pkg_glob }}
          if-no-files-found: error
          retention-days: 14
